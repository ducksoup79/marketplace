# Apache 2 – Frontend (webapp) with security headers
# Requires: mod_headers, mod_rewrite (a2enmod headers rewrite)
#
# Copy to /etc/apache2/sites-available/ and enable:
#   sudo cp production/apache/frontend-with-security-headers.conf /etc/apache2/sites-available/marketplace-frontend.conf
#   sudo a2ensite marketplace-frontend
#   sudo systemctl reload apache2
#
# Replace yourdomain.com with your domain and DocumentRoot with your frontend dist path.
# Use SSL in production; HSTS is only set in the HTTPS VirtualHost below.

<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    DocumentRoot /var/www/marketplace/frontend/dist

    <Directory /var/www/marketplace/frontend/dist>
        Require all granted
        Options -Indexes +FollowSymLinks

        # SPA fallback: serve index.html for non-file requests
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]

        # Security headers (HSTS only over HTTPS — see HTTPS vhost below)
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    </Directory>
</VirtualHost>

# HTTPS VirtualHost – uncomment and adjust after obtaining SSL (e.g. certbot)
# Then: sudo a2enmod ssl && sudo systemctl reload apache2

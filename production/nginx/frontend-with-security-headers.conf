# Frontend (webapp) with security headers
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled.
# Replace yourdomain.com with your domain and set root to your frontend dist path.
# Use SSL (e.g. Certbot) in production; HSTS is only set in the HTTPS block below.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/marketplace/frontend/dist;
    index index.html;

    # Security headers (HSTS only over HTTPS — see SSL block below)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

